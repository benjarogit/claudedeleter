<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Chat Cleaner</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="../icons/icon-48.png" width="40" height="40" alt="" />
    <div class="header-text">
      <h1>AI Chat Cleaner</h1>
      <p class="subtitle" id="subtitle">Bulk-delete AI chat history</p>
    </div>
  </header>

  <main id="mainPage">
    <p id="status" class="status">Open a supported AI chat site.</p>
    <button id="deleteAll" type="button" disabled>Delete all chats</button>
    <div class="progress-block" hidden>
      <label>Overall <span id="overallProgressText">0%</span></label>
      <div class="progress-bar"><div id="overallProgress"></div></div>
      <label>Current chat <span id="currentProgressText">0%</span></label>
      <div class="progress-bar"><div id="currentProgress"></div></div>
    </div>
    <p id="error" class="error" hidden></p>
    <div id="debugActions" class="debug-actions" hidden>
      <button id="copyDebug" type="button" class="secondary">Copy debug report</button>
      <button id="reportGithub" type="button" class="secondary">Report on GitHub</button>
      <p class="debug-hint">Safe to share — tokens, emails &amp; chat IDs are redacted.</p>
    </div>
    <div id="log" class="log" aria-live="polite"></div>
  </main>

  <section id="confirmPage" hidden>
    <h2 id="confirmTitle">Confirm deletion</h2>
    <p id="confirmBody">Delete all conversations? This cannot be undone.</p>
    <div class="actions">
      <button id="confirmYes" type="button" class="danger">Yes, delete all</button>
      <button id="confirmNo" type="button" class="secondary">Cancel</button>
    </div>
  </section>

  <footer>
    <a href="https://sunnyc.de" target="_blank" rel="noopener">Sunny C.</a>
    ·
    <a id="footerIdeas" href="https://github.com/benjarogit/ai-chat-cleaner/issues/new?template=feature_request.yml" target="_blank" rel="noopener">Ideas</a>
    ·
    <a id="footerGithub" href="https://github.com/benjarogit/ai-chat-cleaner" target="_blank" rel="noopener">GitHub</a>
    ·
    <span id="footerSupport">Support</span>
    <a id="footerKofi" href="https://ko-fi.com/aichatcleaner" target="_blank" rel="noopener">Ko-fi</a>
    ·
    <a id="footerPatreon" href="https://www.patreon.com/SunnyCueq" target="_blank" rel="noopener">Patreon</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
